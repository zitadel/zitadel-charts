name: 'Test Charts'

on: 'pull_request'

jobs:
  test:

    runs-on: 'depot-ubuntu-24.04-16'

    permissions:
      contents: 'read'
      id-token: 'write'

    timeout-minutes: 60

    steps:
      - id: 'checkout'
        name: Check The Repo Out
        uses: 'actions/checkout@v5.0.0'
        with:
          fetch-depth: 0

      - name: Get Changed Test Relevant Files
        id: 'list-changed-test'
        uses: tj-actions/changed-files@v47
        with:
          files: |
            charts/zitadel/**
            examples/**/*.yaml
            go.mod
            go.sum

      - id: 'setup-go'
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - id: 'setup-helm-schema'
        name: Install Helm Schema Plugin
        run: helm plugin install https://github.com/losisin/helm-values-schema-json.git

      - id: 'setup-chrome'
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 143

      - id: 'install-helm-docs'
        name: Install helm-docs
        run: |
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar xz
          sudo mv helm-docs /usr/local/bin/

      - id: 'test'
        name: Run Go Tests
        run: 'go test -timeout 30m ./...'

      - id: 'upload-login-failures'
        name: Upload Login Failures
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          include-hidden-files: true
          name: login-failures
          path: test/acceptance/.login-failures
          retention-days: 30
