{{- if and .Values.login.enabled (not .Values.login.loginServiceKeySecretName) }}
{{- $secretName := printf "%s-login-service-key" (include "zitadel.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if and $existingSecret $existingSecret.data (hasKey $existingSecret.data "tls.crt") (hasKey $existingSecret.data "tls.key") }}
{{- /* Reuse existing keypair to prevent key rotation on upgrade */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zitadel.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ index $existingSecret.data "tls.crt" }}
  tls.key: {{ index $existingSecret.data "tls.key" }}
{{- else }}
{{- /* Generate a self-signed RSA certificate. The public cert (tls.crt) is
       mounted into ZITADEL for JWT verification via SystemAPIUsers. The private
       key (tls.key) is mounted into the Login container for JWT signing.
       During helm template or --dry-run, lookup returns empty so a fresh cert
       is always shown; actual installs/upgrades preserve the existing cert. */ -}}
{{- $cert := genSelfSignedCert "login-service" nil (list "login-service") 3650 }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zitadel.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- end }}
