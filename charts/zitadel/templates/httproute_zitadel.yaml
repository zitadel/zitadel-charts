{{- if .Values.gateway.zitadel.httpRoute.enabled -}}
{{- $fullName := include "zitadel.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zitadel.labels" . | nindent 4 }}
  {{- with .Values.gateway.zitadel.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.gateway.zitadel.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  hostnames:
    {{- if .Values.gateway.zitadel.httpRoute.hostnames }}
    {{- toYaml .Values.gateway.zitadel.httpRoute.hostnames | nindent 4 }}
    {{- else }}
    - {{ .Values.zitadel.configmapConfig.ExternalDomain | quote }}
    {{- end }}
  rules:
    {{- if .Values.gateway.zitadel.httpRoute.rules }}
    {{- toYaml .Values.gateway.zitadel.httpRoute.rules | nindent 4 }}
    {{- else }}
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
    {{- end }}
{{- end }}
