# Quickstart values — full stack with bundled PostgreSQL + Traefik.
# Uses postgresql.enabled=true and traefik.enabled=true to deploy a fully
# self-contained stack. All passwords are intentional dev placeholders.
# DO NOT use these values for any non-local deployment.

# Deploy PostgreSQL as a subchart. The chart auto-populates the ZITADEL
# database host, port, credentials, and SSL mode from the values below.
postgresql:
  enabled: true
  auth:
    database: zitadel
    username: zitadel
    password: zitadel
    postgresPassword: zitadel
  primary:
    persistence:
      enabled: false

# Deploy Traefik as a subchart. The chart automatically sets ingress.className
# to "traefik" for both the API and Login ingresses.
# isDefaultClass: false ensures the bundled Traefik only handles ZITADEL's
# Ingresses and does not conflict with any existing ingress controller.
traefik:
  enabled: true
  ingressClass:
    isDefaultClass: false
  # Restrict to release namespace on shared clusters (replace "default"):
  # providers:
  #   kubernetesIngress:
  #     namespaces: ["default"]
  #   kubernetesCRD:
  #     namespaces: ["default"]

zitadel:
  # Dev-only masterkey — generate a real one before any non-local deployment:
  # tr -dc A-Za-z0-9 </dev/urandom | head -c 32
  masterkey: "MasterkeyNeedsToHave32Characters"

  configmapConfig:
    ExternalDomain: localhost   # replace with your domain or IP
    ExternalPort: 80            # Traefik LoadBalancer port
    ExternalSecure: false
    TLS:
      Enabled: false
    FirstInstance:
      Org:
        Human:
          UserName: zitadel-admin
          Email: zitadel-admin@zitadel.localhost
          Password: "Password1!"
          PasswordChangeRequired: false

# ingress.className is automatically set to "traefik" when traefik.enabled=true.
# Override it here if you want to use a different ingress controller.
ingress:
  enabled: true
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix

login:
  ingress:
    enabled: true
    hosts:
      - host: localhost
        paths:
          - path: /ui/v2/login
            pathType: Prefix
